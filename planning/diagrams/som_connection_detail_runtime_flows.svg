<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg"><title>SOM connection detail showing runtime data flows between pillars: issuance from ARCA, guardrail enforcement, message routing, dispatch, knowledge retrieval, and telemetry emission</title><desc>ARCA issues identities across the dashed boundary at birth only. Identity feeds authorization into PGE. PGE enforces guardrails on Workforce and DPG. IBX routes messages between Workforce, the Judge, and CRB-driven dispatch. CRB allocates compute to DPG. Workforce and AKB exchange role-projected knowledge. Workforce and DPG emit telemetry to ACT.</desc>
