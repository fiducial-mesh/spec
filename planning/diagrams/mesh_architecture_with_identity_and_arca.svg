<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg"><title>Sovereign Orchestration Mesh architecture with the ARCA issuing authority above the issuance/runtime boundary and the Identity layer on the control plane</title><desc>ARCA sits above a dashed line as an offline issuing authority connected only at agent birth. Below the line, three planes (Control, Compute, State) hold the runtime pillars, with Identity placed beneath the Policy Guardrail Engine on the Control Plane.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<g><rect x="220" y="20" width="240" height="56" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/><text x="340" y="40" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">ARCA — issuing authority</text><text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#854F0B">Offline. Issues identities, then exits</text></g>
<text x="240" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">issues agent identities</text>
<text x="240" y="116" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">(birth only)</text>
<line x1="340" y1="76" x2="340" y2="128" stroke="#888780" stroke-width="1" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
<line x1="60" y1="130" x2="620" y2="130" stroke="#888780" stroke-width="0.5" stroke-dasharray="5 5"/>
<text x="620" y="124" text-anchor="end" font-family="sans-serif" font-size="12" fill="#5F5E5A">issuance / runtime boundary</text>
<g><rect x="40" y="150" width="600" height="190" rx="16" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="60" y="172" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">Control plane</text></g>
<g><rect x="60" y="190" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/><text x="150" y="210" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">Identity</text><text x="150" y="230" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0F6E56">AuthN / AuthZ, attribution</text></g>
<g><rect x="60" y="266" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="150" y="286" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">PGE</text><text x="150" y="306" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Policy guardrail engine</text></g>
<line x1="150" y1="246" x2="150" y2="266" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<g><rect x="270" y="190" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="350" y="210" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">PCS</text><text x="350" y="230" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Plugin control system</text></g>
<g><rect x="270" y="266" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="350" y="286" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">IBX</text><text x="350" y="306" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Inbox exchange</text></g>
<g><rect x="460" y="190" width="160" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/><text x="540" y="210" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">CRB</text><text x="540" y="230" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#185FA5">Compute resource broker</text></g>
<g><rect x="460" y="266" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/><text x="540" y="286" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">Judge</text><text x="540" y="306" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7">Human approval gate</text></g>
<g><rect x="40" y="364" width="600" height="150" rx="16" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text x="60" y="386" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A">Compute plane</text></g>
<g><rect x="60" y="404" width="370" height="90" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text x="245" y="424" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A">Workforce</text><text x="245" y="444" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3B6D11">Agents — each a signed principal</text><text x="245" y="470" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3B6D11">Watson · Bob · Patton · Einstein · Newton</text></g>
<g><rect x="460" y="404" width="160" height="90" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/><text x="540" y="440" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#27500A">DPG</text><text x="540" y="462" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3B6D11">Deterministic proving</text></g>
<g><rect x="40" y="538" width="600" height="150" rx="16" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="60" y="560" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">State plane</text></g>
<g><rect x="60" y="578" width="270" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="195" y="608" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">AKB</text><text x="195" y="630" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Knowledge base — role-projected,</text><text x="195" y="648" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">enforced forgetting</text></g>
<g><rect x="360" y="578" width="260" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/><text x="490" y="608" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">ACT</text><text x="490" y="630" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">Cognitive telemetry —</text><text x="490" y="648" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#993C1D">immutable attribution</text></g>
</svg>