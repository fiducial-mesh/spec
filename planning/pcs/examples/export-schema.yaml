# PCS Skill Spec v0.1 — export-schema
#
# mutate_local + idempotent. Generates a JSON Schema file from a
# Pydantic model. Writes to local filesystem only. Safe to re-run —
# output is deterministic given the same model, so overwriting is
# harmless (idempotent).

name: export-schema
version: "0.1.0"
owner: watson
lifecycle_state: active
trust_tier: community
effect: mutate_local
is_idempotent: true
requires_capabilities:
  - filesystem_write
  - python_runtime
inputs:
  type: object
  properties:
    model_module:
      type: string
      description: "Python module path containing the Pydantic model."
    output_path:
      type: string
      description: "Filesystem path to write the JSON Schema."
  required:
    - model_module
    - output_path
outputs:
  type: object
  properties:
    path:
      type: string
      description: "Absolute path of the written schema file."
    schema_title:
      type: string
      description: "Title from the generated JSON Schema."
  required:
    - path
