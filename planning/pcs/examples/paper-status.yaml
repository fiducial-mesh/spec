# PCS Skill Spec v0.1 — paper-status
#
# Pure read-only skill. Reads PAPER-TRACKER.md and referenced files,
# produces a status briefing. No external calls, no mutations.

name: paper-status
version: "0.1.0"
owner: watson
lifecycle_state: active
trust_tier: blessed
effect: pure
requires_capabilities:
  - filesystem_read
inputs:
  type: object
  properties:
    filter:
      type: string
      description: "Optional filter by status (DRAFT, PUBLISHED, BLOCKED, etc.)"
  required: []
outputs:
  type: object
  properties:
    scoreboard:
      type: object
      description: "Count of papers by status."
    papers:
      type: array
      description: "Per-paper status with title, phase, blockers."
    actionable:
      type: array
      description: "Papers ready to advance."
    blocked:
      type: array
      description: "Papers with specific dependency blockers."
  required:
    - scoreboard
    - papers
