# PCS Skill Spec v0.1 — inbox-check
#
# Pure read-only skill. Queries the agent message inbox for unread
# and approved messages. Returns structured message list.

name: inbox-check
version: "0.1.0"
owner: watson
lifecycle_state: active
trust_tier: blessed
effect: pure
requires_capabilities:
  - inbox_read_access
inputs:
  type: object
  properties:
    recipient:
      type: string
      description: "Agent name to check inbox for."
  required:
    - recipient
outputs:
  type: object
  properties:
    unread_count:
      type: integer
    approved_count:
      type: integer
    messages:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
          sender:
            type: string
          priority:
            type: string
          subject:
            type: string
          timestamp:
            type: string
  required:
    - unread_count
    - approved_count
    - messages
