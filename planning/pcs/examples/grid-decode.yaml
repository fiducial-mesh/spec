# PCS Skill Spec v0.1 — grid-decode
#
# Boring on purpose. The POC's job is to expose every seam in the
# spec / harness / registry model, not to demo something flashy.
# A grid-square decoder forces you to confront whether the model
# has overhead that doesn't earn its keep.

name: grid-decode
version: "0.1.0"
owner: ki7mt
lifecycle_state: active
trust_tier: blessed
effect: pure
requires_capabilities: []
inputs:
  type: object
  properties:
    grid:
      type: string
      pattern: "^[A-R]{2}[0-9]{2}([a-x]{2})?$"
      description: "Maidenhead grid locator (4 or 6 character)."
  required:
    - grid
outputs:
  type: object
  properties:
    latitude:
      type: number
      description: "Center latitude of the grid square (decimal degrees)."
    longitude:
      type: number
      description: "Center longitude of the grid square (decimal degrees)."
    precision:
      type: string
      enum: [field, square, subsquare]
      description: "Resolution level based on grid length."
  required:
    - latitude
    - longitude
    - precision
